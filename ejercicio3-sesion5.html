<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mayor de 3 números</title>
</head>

<body>

<h3>Mostrar el mayor de 3 números</h3>

<input type="number" id="v1" placeholder="Número 1"><br><br>
<input type="number" id="v2" placeholder="Número 2"><br><br>
<input type="number" id="v3" placeholder="Número 3"><br><br>

<button onclick="hallarMayor()">Calcular</button>

<p id="salida"></p>

<script>
function hallarMayor() {

    let nums = [
        parseFloat(document.getElementById("v1").value),
        parseFloat(document.getElementById("v2").value),
        parseFloat(document.getElementById("v3").value)
    ];

    document.getElementById("salida").innerText =
        "El mayor es: " + Math.max(...nums);
}
</script>

</body>
</html>
