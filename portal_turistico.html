<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Turismo Explora - Galería Interactiva</title>
    <style>
        /* Configuración Global */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Trebuchet MS', sans-serif;
            background-color: #f0f8ff; /* Azul muy claro */
        }

        /* Contenedor principal con tabla */
        table {
            width: 95%;
            height: 90vh;
            margin: 20px auto;
            border-collapse: separate;
            border-spacing: 10px; /* Espacio entre "celdas" para diseño moderno */
        }

        /* Menú Lateral */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #2e86de, #54a0ff);
            border-radius: 15px;
            padding: 30px 15px;
            vertical-align: top;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        .sidebar h1 {
            color: white;
            text-align: center;
            font-size: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* Estilo de los Enlaces con Emojis */
        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .sidebar a:hover {
            background: white;
            color: #2e86de;
            transform: translateX(10px);
        }

        /* Columna del Visor (Iframe) */
        .viewer {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <td class="sidebar">
            <h1>🌴 Guía Turística</h1>
            <nav>
                <a href="playas.html" target="visor">🏖️ Playas</a>
                <a href="rutas.html" target="visor">🥾 Rutas</a>
                <a href="hoteles.html" target="visor">🏨 Hoteles</a>
                <a href="gastronomia.html" target="visor">🥘 Gastronomía</a>
            </nav>
        </td>

        <td class="viewer">
            <iframe name="visor" src="playas.html" title="Galería Turística">
                Selecciona una sección del menú.
            </iframe>
        </td>
    </tr>
</table>

</body>
</html>
