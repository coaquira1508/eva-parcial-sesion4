<!DOCTYPE html>
<html>
<body>
    <h3>Promedio de 3 Notas</h3>
    <input type="number" id="n1" placeholder="Nota 1"><br>
    <input type="number" id="n2" placeholder="Nota 2"><br>
    <input type="number" id="n3" placeholder="Nota 3"><br>
    <button onclick="promediar()">Calcular</button>
    <p id="res"></p>

    <script>
        function promediar() {
            let a = parseFloat(document.getElementById("n1").value);
            let b = parseFloat(document.getElementById("n2").value);
            let c = parseFloat(document.getElementById("n3").value);
            document.getElementById("res").innerText = "Promedio: " + ((a+b+c)/3).toFixed(2);
        }
    </script>
</body>
</html>
