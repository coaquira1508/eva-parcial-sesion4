<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Práctica Individual - Tablas y Logos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        h1 {
            text-transform: uppercase;
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* Estilos de la Tabla de Notas */
        .tabla-notas {
            width: 400px;
            border-collapse: collapse;
            border: 2px solid black;
            margin-bottom: 40px;
        }

        .tabla-notas th, .tabla-notas td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        .tabla-notas th {
            text-transform: uppercase;
        }

        /* Estilos del Contenedor de Logos */
        .logo-container {
            width: 400px;
            border-collapse: collapse;
            border: 2px solid black;
        }

        .logo-header {
            border-bottom: 2px solid black;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        .logo-links {
            display: flex;
            justify-content: space-around;
            padding: 20px 10px;
        }

        .logo-links span {
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>practica individual</h1>

    <table class="tabla-notas">
        <thead>
            <tr>
                <th>Alumno</th>
                <th>Nota</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>Pepe</td><td>7,65</td></tr>
            <tr><td>María</td><td>8,54</td></tr>
            <tr><td>Jordi</td><td>5,55</td></tr>
            <tr><td>MEDIA</td><td>7,25</td></tr>
            <tr><td>DESV. TÍPICA</td><td>7,25</td></tr>
            <tr><td>&nbsp;</td><td>7,35</td></tr>
        </tbody>
    </table>

    <div class="logo-container">
        <div class="logo-header">logo-container</div>
        <div class="logo-links">
            <span>AMAZON</span>
            <span>YOUTUBE</span>
        </div>
    </div>

</body>
</html>
