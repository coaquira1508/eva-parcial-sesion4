<!DOCTYPE html>
<html>
<head>
    <title>Jugadores de Leyenda</title>
    <style>
        table {
            border: 2px solid black;
            padding: 10px;
            width: 50%;
        }
        h1 {
            margin-top: 0;
        }
        /* Los círculos de las sublistas cambien de estilo */
        ul ul {
            list-style-type: square; /* Para España */
        }
        .francia ul {
            list-style-type: disc; /* Para Francia */
        }
        .brasil ul {
            list-style-type: circle; /* Para Brasil */
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td>
                <h1>Jugadores de fútbol de leyenda</h1>
                
                <ul>
                    <li>España
                        <ul style="list-style-type: square;">
                            <li>Casillas</li>
                            <li>Xavi</li>
                            <li>Iniesta</li>
                        </ul>
                    </li>

                    <li>Francia
                        <ul style="list-style-type: disc;">
                            <li>Zidane</li>
                            <li>Henry</li>
                            <li>Barthez</li>
                        </ul>
                    </li>

                    <li>Brasil
                        <ul style="list-style-type: circle;">
                            <li>Ronaldo</li>
                            <li>Pelé</li>
                            <li>Ronaldinho</li>
                        </ul>
                    </li>
                </ul>
            </td>
        </tr>
    </table>

</body>
</html>
