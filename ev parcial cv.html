<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rellena tu CV</title>

    <style>
        /* Fondo de página color blanco */
        body {
            font-family: Arial, sans-serif;
            background: #ffffff; 
            padding: 20px;
            margin: 0;
        }

        /* Línea de Datos Personales en color blanco */
        fieldset {
            width: 420px;
            border: 1px solid #cccccc; /* Línea delgada y color suave */
            padding: 20px;
            background: #ffffff;
            border-radius: 5px; /* Borde ligeramente redondeados */
        }

        legend {
            font-weight: bold;
            padding: 0 10px; /* Espaciado para que la línea no pegue al texto */
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
        }

        select, input {
            margin-top: 5px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        /* Estilo para los inputs de números (Día y Año) */
        input[type="number"] {
            width: 60px;
        }

        select[multiple] {
            width: 100%; /* Se ajusta al ancho del fieldset */
            height: 120px;
        }
    </style>
</head>

<body>

    <h2>Rellena tu CV</h2>

    <form>
        <fieldset>
            <legend>Datos personales</legend>

            <label>Provincia</label>
            <select>
                <option>- selecciona -</option>
                <option>Piura</option>
                <option>Sullana</option>
                <option>Ayabaca</option>
                <option>Huancabamba</option>
                <option>Morropón</option>
            </select>

            <label>Fecha de nacimiento</label>
            <input type="number" min="1" max="31" placeholder="Día">
            de
            <select>
                <option>Enero</option>
                <option>Febrero</option>
                <option>Marzo</option>
                <option>Abril</option>
                <option>Mayo</option>
                <option>Junio</option>
                <option>Julio</option>
                <option>Agosto</option>
                <option>Septiembre</option>
                <option>Octubre</option>
                <option>Noviembre</option>
                <option>Diciembre</option>
            </select>
            de
            <input type="number" min="1950" max="2026" placeholder="Año">

            <label>Temas de interés</label>
            <select multiple>
                <option>Base de datos</option>
                <option>Análisis y programación</option>
                <option>Desarrollo de software</option>
                <option>Gestión de redes</option>
                <option>Análisis de datos</option>
                <option>Inteligencia Artificial</option>
                <option>Seguridad Informática</option>
            </select>
        </fieldset>
    </form>

</body>
</html>
