<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Escolar - Maquetación con Tablas</title>
    <style>
        /* Reset básico */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Estilo de la tabla principal */
        table {
            width: 100%;
            height: 100vh; /* Ocupa todo el alto de la pantalla */
            border-collapse: collapse;
        }

        /* Columna del Menú Lateral */
        .menu-lateral {
            width: 250px;
            background-color: #2c3e50; /* Color oscuro profesional */
            vertical-align: top;
            padding: 20px;
        }

        .menu-lateral h2 {
            color: #ecf0f1;
            font-size: 1.2rem;
            text-align: center;
            border-bottom: 1px solid #7f8c8d;
            padding-bottom: 10px;
        }

        /* Estilo de los Enlaces solicitado */
        .menu-lateral a {
            display: block;
            color: white;             /* Color blanco */
            text-decoration: none;    /* Sin subrayado */
            padding: 15px;
            margin-bottom: 5px;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .menu-lateral a:hover {
            background-color: #34495e;
            color: #3498db;
        }

        /* Columna del Contenido (Iframe) */
        .contenido-principal {
            background-color: #f4f4f4;
            padding: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td class="menu-lateral">
                <h2>Portal Escolar</h2>
                <nav>
                    <a href="inicio.html" target="contenedor">Inicio</a>
                    <a href="cursos.html" target="contenedor">Cursos</a>
                    <a href="noticias.html" target="contenedor">Noticias</a>
                    <a href="contacto.html" target="contenedor">Contacto</a>
                </nav>
            </td>

            <td class="contenido-principal">
                <iframe name="contenedor" src="inicio.html" title="Contenido del portal">
                    Tu navegador no soporta iframes.
                </iframe>
            </td>
        </tr>
    </table>

</body>
</html>
